<html lang="en">
<head>

<title>Sandbox Generator Roller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root {
  --bg:#0f0e17; --bg2:#1a1a2e; --bg3:#16213e; --card:#1e1e30; --card2:#252540;
  --accent:#c8a96e; --accent2:#9b7fd4; --text:#e8e0d0; --text2:#a89880;
  --border:#3a3a5c; --btn:#3d2f6b; --btn-hover:#5a4490; --sec:#2a2040;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px}
#app{max-width:1400px;margin:0 auto;padding:20px}
header{text-align:center;padding:28px 20px 20px;border-bottom:2px solid var(--border);margin-bottom:24px}
h1{font-family:'Cinzel',serif;font-size:clamp(1.5rem,4vw,2.6rem);font-weight:700;color:var(--accent);letter-spacing:.1em}
.sub{color:var(--text2);font-style:italic;margin-top:6px;font-size:.9rem}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;padding:9px 16px;background:var(--bg2);border:1px solid var(--border);border-bottom:none;color:var(--text2);cursor:pointer;border-radius:4px 4px 0 0;transition:all .15s;text-transform:uppercase}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--accent);border-color:var(--accent2);margin-bottom:-1px}
.tab-pane{display:none}.tab-pane.active{display:block}
.roll-all-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.btn-all{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.1em;padding:10px 24px;background:linear-gradient(135deg,#4a3080,#6a4aaa);border:1px solid var(--accent2);color:#fff;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .15s}
.btn-all:hover{background:linear-gradient(135deg,#6a4aaa,#8a6acc);transform:translateY(-1px)}
.hint{color:var(--text2);font-style:italic;font-size:.85rem}
.sec-head{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text);background:var(--sec);border:1px solid var(--accent2);border-left:3px solid var(--accent2);padding:9px 14px;margin:18px 0 3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
@media(max-width:780px){.grid{grid-template-columns:1fr}}
.row{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:2px;overflow:hidden;transition:border-color .15s}
.row:hover{border-color:var(--accent2)}
.row.wide{grid-column:1/-1}
.lbl{flex:0 0 190px;padding:8px 10px;font-size:.78rem;color:var(--text2);background:var(--bg3);border-right:1px solid var(--border);display:flex;align-items:center;line-height:1.3}
.res{flex:1;padding:8px 12px;font-family:'Crimson Text',serif;font-size:1rem;font-weight:600;color:var(--accent);display:flex;align-items:center;min-height:40px;word-break:break-word}
.row.wide .res{font-size:1.1rem;color:var(--accent2);font-style:italic}
@keyframes pop{0%{opacity:.3;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
.pop{animation:pop .12s ease}
.btn-row{flex:0 0 40px;background:var(--btn);border:none;border-left:1px solid var(--border);color:var(--accent);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.btn-row:hover{background:var(--btn-hover);color:#fff}
.btn-row:active{transform:scale(.9)}
footer{text-align:center;color:var(--text2);font-size:.78rem;font-style:italic;padding:28px 0 14px;border-top:1px solid var(--border);margin-top:28px}
</style>
</head>

function buildTab(tab) {
  var html = '<div class="roll-all-bar"><button class="btn-all" data-tab="' + tab.id + '">&#8635; Roll All</button><span class="hint">or click &#8635; on any row to roll just that table</span></div>';
  for (var s = 0; s < tab.sections.length; s++) {
    var sec = tab.sections[s];
    var secId = tab.id + '_sec_' + s;
    html += '<div class="sec-head" style="display:flex;align-items:center;justify-content:space-between;">'
          + '<span>' + sec.title + '</span>'
          + '<button class="btn-sec-all" data-sec="' + secId + '" style="font-family:inherit;font-size:0.68rem;letter-spacing:0.08em;padding:3px 10px;background:rgba(155,127,212,0.25);border:1px solid var(--accent2);color:var(--accent);cursor:pointer;border-radius:2px;text-transform:uppercase;white-space:nowrap;">&#8635; Roll Section</button>'
          + '</div>'
          + '<div class="grid" id="' + secId + '">';
    for (var ri = 0; ri < sec.rows.length; ri++) {
      var row = sec.rows[ri];
      var label = row[0], key = row[1];
      var wide = (sec.rows.length === 1) ? ' wide' : '';
      var initial = rollKey(key);
      var uid = tab.id + '_' + s + '_' + ri;
      html += '<div class="row' + wide + '">'
            + '<div class="lbl">' + label + '</div>'
            + '<div class="res" id="res_' + uid + '">' + initial + '</div>'
            + '<button class="btn-row" data-uid="' + uid + '" data-key="' + key + '">&#8635;</button>'
            + '</div>';
    }
    html += '</div>';
  }
  return html;
}

for (var i = 0; i < TABS.length; i++) {
  var tab = TABS[i];
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = tab.label;
  btn.setAttribute('data-target', tab.id);
  tabBar.appendChild(btn);

  var pane = document.createElement('div');
  pane.className = 'tab-pane' + (i === 0 ? ' active' : '');
  pane.id = 'pane_' + tab.id;
  pane.innerHTML = buildTab(tab);
  tabPanes.appendChild(pane);
}

tabBar.addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  var target = btn.getAttribute('data-target');
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('pane_' + target).classList.add('active');
});

tabPanes.addEventListener('click', function(e) {
  var btn = e.target.closest('.btn-row');
  if (btn) {
    var uid = btn.getAttribute('data-uid');
    var key = btn.getAttribute('data-key');
    var el = document.getElementById('res_' + uid);
    if (el) rerollEl(el, key);
    return;
  }
  var allBtn = e.target.closest('.btn-all');
  if (allBtn) {
    var tabId = allBtn.getAttribute('data-tab');
    var pane = document.getElementById('pane_' + tabId);
    var btns = pane.querySelectorAll('.btn-row');
    btns.forEach(function(b) {
      var uid = b.getAttribute('data-uid');
      var key = b.getAttribute('data-key');
      var el = document.getElementById('res_' + uid);
      if (el) rerollEl(el, key);
    });
    return;
  }
  var secBtn = e.target.closest('.btn-sec-all');
  if (secBtn) {
    var secId = secBtn.getAttribute('data-sec');
    var grid = document.getElementById(secId);
    if (grid) {
      grid.querySelectorAll('.btn-row').forEach(function(b) {
        var uid = b.getAttribute('data-uid');
        var key = b.getAttribute('data-key');
        var el = document.getElementById('res_' + uid);
        if (el) rerollEl(el, key);
      });
    }
  }
});
</script>
</body>
</html>
