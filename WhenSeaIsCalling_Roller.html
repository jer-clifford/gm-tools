<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>When Sea Is Calling — Roller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
:root {
  --sky:    #b8dde8;
  --sea:    #4a9bb5;
  --deep:   #1e5f74;
  --abyss:  #0e3347;
  --sand:   #d4b483;
  --shore:  #c49a5a;
  --foam:   #e8f4f8;
  --white:  #f5f0e8;
  --hull:   #c4862a;
  --slate:  #2e5464;
  --teal:   #3a8fa3;
  --green:  #5a8a5a;
  --text:   #1a3a4a;
  --text2:  #3a6a7a;
  --btn:    #1e5f74;
  --btn-h:  #3a8fa3;
  --wave1:  rgba(74,155,181,0.15);
  --wave2:  rgba(30,95,116,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body {
  background: linear-gradient(180deg, var(--sky) 0%, var(--foam) 40%, var(--white) 100%);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 15px;
  min-height: 100vh;
  position: relative;
}
/* wave decoration */
body::before {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, transparent, rgba(74,155,181,0.08));
  pointer-events: none;
  z-index: 0;
}
#app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 0 20px 40px; }

header {
  text-align: center;
  padding: 32px 20px 24px;
  position: relative;
  margin-bottom: 8px;
}
header::after {
  content: '';
  display: block;
  width: 60%;
  margin: 16px auto 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--sea), var(--hull), var(--sea), transparent);
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 700;
  color: var(--deep);
  letter-spacing: 0.04em;
  text-shadow: 0 2px 8px rgba(74,155,181,0.2);
  line-height: 1.1;
}
h1 span {
  color: var(--hull);
  font-style: italic;
  font-weight: 700;
}
.sub {
  color: var(--slate);
  font-style: italic;
  margin-top: 6px;
  font-size: 1rem;
  font-family: 'Lora', serif;
}

/* rope/wave divider */
.rope {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 20px;
}
.rope::before, .rope::after {
  content: ''; flex: 1;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--sand) 0px, var(--sand) 6px, transparent 6px, transparent 10px);
  opacity: 0.6;
}
.rope-anchor {
  color: var(--hull);
  font-size: 1.2rem;
  opacity: 0.7;
}

/* Tabs */
.tabs {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 0;
  padding: 0 4px;
}
.tab-btn {
  font-family: 'Playfair Display', serif;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  padding: 10px 20px;
  background: rgba(74,155,181,0.15);
  border: 1px solid rgba(74,155,181,0.3);
  border-bottom: none;
  color: var(--slate);
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  transition: all .15s;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}
.tab-btn:hover { background: rgba(74,155,181,0.3); color: var(--deep); }
.tab-btn.active {
  background: var(--foam);
  color: var(--deep);
  border-color: rgba(74,155,181,0.4);
  border-bottom-color: var(--foam);
  margin-bottom: -1px;
  font-weight: bold;
  box-shadow: 0 -2px 8px rgba(74,155,181,0.15);
}
.tab-pane { display: none; }
.tab-pane.active {
  display: block;
  background: var(--foam);
  border: 1px solid rgba(74,155,181,0.3);
  border-radius: 0 6px 6px 6px;
  padding: 20px;
  box-shadow: 0 4px 20px rgba(30,95,116,0.1);
}

/* Roll all bar */
.roll-all-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 18px;
  padding-bottom: 16px;
  border-bottom: 1px dashed rgba(74,155,181,0.4);
}
.btn-all {
  font-family: 'Playfair Display', serif;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  padding: 9px 22px;
  background: linear-gradient(135deg, var(--deep), var(--sea));
  border: 1px solid var(--teal);
  color: var(--foam);
  cursor: pointer;
  border-radius: 4px;
  text-transform: uppercase;
  transition: all .15s;
  box-shadow: 0 2px 8px rgba(30,95,116,0.2);
}
.btn-all:hover {
  background: linear-gradient(135deg, var(--teal), var(--sea));
  box-shadow: 0 4px 16px rgba(30,95,116,0.3);
  transform: translateY(-1px);
}
.hint { color: var(--text2); font-style: italic; font-size: 0.82rem; }

/* Section heads */
.sec-head {
  font-family: 'Playfair Display', serif;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--deep);
  background: linear-gradient(90deg, rgba(74,155,181,0.12), transparent);
  border-left: 3px solid var(--hull);
  border-bottom: 1px solid rgba(74,155,181,0.2);
  padding: 8px 14px 8px 12px;
  margin: 18px 0 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sec-head:first-of-type { margin-top: 0; }
.btn-sec {
  font-family: 'Playfair Display', serif;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  padding: 4px 12px;
  background: linear-gradient(135deg, var(--deep), var(--sea));
  border: 1px solid var(--teal);
  color: var(--foam);
  cursor: pointer;
  border-radius: 3px;
  text-transform: uppercase;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-sec:hover {
  background: linear-gradient(135deg, var(--teal), var(--sea));
  transform: translateY(-1px);
}

/* Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
@media(max-width: 760px){ .grid { grid-template-columns: 1fr; } }

/* Row */
.row {
  display: flex; align-items: stretch;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(74,155,181,0.18);
  border-radius: 3px; overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  backdrop-filter: blur(2px);
}
.row:hover { border-color: rgba(74,155,181,0.45); box-shadow: 0 2px 8px rgba(74,155,181,0.1); }
.row.wide { grid-column: 1 / -1; }
.lbl {
  flex: 0 0 185px;
  padding: 8px 10px;
  font-size: 0.78rem;
  color: var(--text2);
  background: rgba(184,221,232,0.25);
  border-right: 1px solid rgba(74,155,181,0.18);
  display: flex; align-items: center;
  font-family: 'Lora', serif;
  line-height: 1.3;
}
.res {
  flex: 1;
  padding: 8px 12px;
  font-family: 'Lora', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--deep);
  display: flex; align-items: center;
  min-height: 40px;
  word-break: break-word;
  line-height: 1.35;
}
.row.wide .res {
  font-size: 1rem;
  color: var(--hull);
  font-style: italic;
}
@keyframes splash {
  0% { opacity: 0.2; transform: translateX(-4px); }
  100% { opacity: 1; transform: translateX(0); }
}
.splash { animation: splash .14s ease; }
.btn-row {
  flex: 0 0 38px;
  background: rgba(30,95,116,0.08);
  border: none;
  border-left: 1px solid rgba(74,155,181,0.2);
  color: var(--sea);
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s; padding: 0;
}
.btn-row:hover { background: var(--sea); color: var(--foam); }
.btn-row:active { transform: scale(.9); }

footer {
  text-align: center;
  color: var(--text2);
  font-size: 0.78rem;
  font-style: italic;
  padding: 24px 0 12px;
  margin-top: 20px;
  border-top: 1px solid rgba(74,155,181,0.3);
  font-family: 'Lora', serif;
}
</style>
</head>

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rollKey(key) { return T[key] ? pick(T[key]) : '—'; }

function rerollEl(el, key) {
  el.textContent = rollKey(key);
  el.classList.remove('splash');
  void el.offsetWidth;
  el.classList.add('splash');
}

function buildTab(tab) {
  var h = '<div class="roll-all-bar"><button class="btn-all" data-tab="' + tab.id + '">&#8635; Roll All</button><span class="hint">or click &#8635; on any row</span></div>';
  for (var s = 0; s < tab.sections.length; s++) {
    var sec = tab.sections[s];
    var secId = tab.id + '_sec_' + s;
    h += '<div class="sec-head"><span>' + sec.title + '</span>'
       + '<button class="btn-sec" data-sec="' + secId + '">&#8635; Roll Section</button></div>'
       + '<div class="grid" id="' + secId + '">';
    for (var ri = 0; ri < sec.rows.length; ri++) {
      var row = sec.rows[ri];
      var wide = sec.rows.length === 1 ? ' wide' : '';
      var uid = tab.id + '_' + s + '_' + ri;
      h += '<div class="row' + wide + '"><div class="lbl">' + row[0] + '</div>'
         + '<div class="res splash" id="r_' + uid + '">' + rollKey(row[1]) + '</div>'
         + '<button class="btn-row" data-uid="' + uid + '" data-key="' + row[1] + '">&#8635;</button></div>';
    }
    h += '</div>';
  }
  return h;
}

var bar = document.getElementById('tabBar');
var panes = document.getElementById('tabPanes');
for (var i = 0; i < TABS.length; i++) {
  var tab = TABS[i];
  var btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.textContent = tab.label;
  btn.setAttribute('data-target', tab.id);
  bar.appendChild(btn);
  var pane = document.createElement('div');
  pane.className = 'tab-pane' + (i===0?' active':'');
  pane.id = 'pane_' + tab.id;
  pane.innerHTML = buildTab(tab);
  panes.appendChild(pane);
}

bar.addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('pane_' + btn.getAttribute('data-target')).classList.add('active');
});

panes.addEventListener('click', function(e) {
  var rb = e.target.closest('.btn-row');
  if (rb) {
    var el = document.getElementById('r_' + rb.getAttribute('data-uid'));
    if (el) rerollEl(el, rb.getAttribute('data-key'));
    return;
  }
  var sb = e.target.closest('.btn-sec');
  if (sb) {
    var grid = document.getElementById(sb.getAttribute('data-sec'));
    if (grid) {
      grid.querySelectorAll('.btn-row').forEach(function(b) {
        var el = document.getElementById('r_' + b.getAttribute('data-uid'));
        if (el) rerollEl(el, b.getAttribute('data-key'));
      });
    }
    return;
  }
  var ab = e.target.closest('.btn-all');
  if (ab) {
    var p = document.getElementById('pane_' + ab.getAttribute('data-tab'));
    p.querySelectorAll('.btn-row').forEach(function(b) {
      var el = document.getElementById('r_' + b.getAttribute('data-uid'));
      if (el) rerollEl(el, b.getAttribute('data-key'));
    });
  }
});
</script>
